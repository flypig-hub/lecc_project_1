server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:rpgbank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
      show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: simple

jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-development-only}
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  security:
    enabled: false

logging:
  level:
    com.rpgbank: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
