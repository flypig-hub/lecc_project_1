server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/rpgbank}
    username: ${DB_USERNAME:rpgbank_user}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
      show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: true
  cache:
    type: simple

jwt:
  secret: ${JWT_SECRET:rpgbank-staging-secret}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  security:
    enabled: false

logging:
  level:
    com.rpgbank: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
