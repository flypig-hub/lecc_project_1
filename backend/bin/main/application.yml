server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:rpgbank
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  security:
    enabled: true

logging:
  level:
    com.rpgbank: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
